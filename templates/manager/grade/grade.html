{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baholash Tizimi</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <style>
        /* Subheader container */
        .subheader {
            background-color: white;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .subheader .container-fluid {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
        }

        /* Nav tabs */
        .subheader .nav-tabs {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .subheader .nav-tabs .nav-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #6b7280;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s;
            background-color: #e5e7eb20;
        }

        .subheader .nav-tabs .nav-link:hover {
            background-color: #e5e7eb;
            color: #3b82f6;
        }

        .subheader .nav-tabs .active {
            background-color: #3b82f6;
            color: white;
            font-weight: 600;
        }

        /* Month/Year Select Styles */
        #month-select, #year-select {
            border: none;
            border-bottom: 2px solid #d1d5db;
            background: transparent;
            color: #374151;
            font-weight: 500;
            padding: 8px 4px;
            transition: all 0.3s;
            width: 150px;
        }

        #month-select:focus, #year-select:focus {
            border-bottom-color: #2563eb;
            outline: none;
        }

        #month-select:hover, #year-select:hover {
            border-bottom-color: #3b82f6;
        }

        /* Grade Cell Styles */
        .grade-cell {
            position: relative;
            min-width: 80px;
            height: 60px;
        }

        .grade-cell.past-date {
            position: relative;
        }

        .grade-cell.past-date::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(240,240,240,0.6) 100%);
            pointer-events: none;
            z-index: 1;
            border-radius: 8px;
        }

        .grade-cell.past-date .grade-value {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grade-cell.past-date .grade-selector {
            display: none !important;
        }

        /* Grade Value Display */
        .grade-value {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .grade-value:hover:not(.disabled) {
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grade-value.grade-5 { 
            color: #10b981;
            background: #d1fae5;
        }
        .grade-value.grade-4 { 
            color: #84cc16;
            background: #ecfccb;
        }
        .grade-value.grade-3 { 
            color: #f59e0b;
            background: #fef3c7;
        }
        .grade-value.grade-2 { 
            color: #f97316;
            background: #ffedd5;
        }
        .grade-value.grade-1 { 
            color: #ef4444;
            background: #fee2e2;
        }

        .grade-value.empty {
            color: #9ca3af;
            background: #f3f4f6;
            font-size: 14px;
        }

        .grade-value.disabled {
            background: #f9fafb;
            color: #d1d5db;
            cursor: not-allowed;
        }

        /* Grade Selector */
        .grade-selector {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 100;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .grade-option {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .grade-option:hover {
            transform: scale(1.15);
        }

        .grade-option.g5 { 
            background: #d1fae5;
            color: #10b981;
        }
        .grade-option.g5:hover { 
            border-color: #10b981;
        }

        .grade-option.g4 { 
            background: #ecfccb;
            color: #84cc16;
        }
        .grade-option.g4:hover { 
            border-color: #84cc16;
        }

        .grade-option.g3 { 
            background: #fef3c7;
            color: #f59e0b;
        }
        .grade-option.g3:hover { 
            border-color: #f59e0b;
        }

        .grade-option.g2 { 
            background: #ffedd5;
            color: #f97316;
        }
        .grade-option.g2:hover { 
            border-color: #f97316;
        }

        .grade-option.g1 { 
            background: #fee2e2;
            color: #ef4444;
        }
        .grade-option.g1:hover { 
            border-color: #ef4444;
        }

        /* Percentage Badge */
        .percentage-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
        }

        .percentage-badge.high {
            background: #d1fae5;
            color: #10b981;
        }

        .percentage-badge.medium {
            background: #fef3c7;
            color: #f59e0b;
        }

        .percentage-badge.low {
            background: #fee2e2;
            color: #ef4444;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .subheader .container-fluid {
                flex-direction: column;
                gap: 12px;
                padding: 12px 16px;
            }
            
            .nav-tabs {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .nav-tabs .nav-link {
                white-space: nowrap;
                padding: 12px 16px;
            }

            .grade-selector {
                flex-wrap: wrap;
                max-width: 200px;
            }
        }

        @media (max-width: 576px) {
            .subheader .nav-tabs {
                flex-direction: column;
                gap: 0.25rem;
            }

            .subheader .nav-tabs .nav-link {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="max-width">
            <!--begin::Subheader-->
            <div class="subheader py-2 py-lg-4 subheader-solid" id="kt_subheader">
                <div class="container-fluid d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
                    <ul class="nav nav-tabs">
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'all' %}active{% endif %}" href="{% url 'manager:group-settings' group.pk %}">All</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'attendance' %}active{% endif %}" href="{% url 'manager:attendance-list' group.pk %}">Davomat</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'baholash' %}active{% endif %}" href="#">Baholash</a>
                        </li>
                    </ul>
                </div>
            </div>
            <!--end::Subheader-->

            <!-- Header -->
            <div class="header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>Baholash Tizimi</h1>
                        <p>{{ group.name }} - O'quvchilar baholarini boshqarish</p>
                    </div>
                    <div class="header-stats">
                        <div class="stat-item">
                            <div class="stat-dot emerald"></div>
                            <span id="student-count">Yuklanmoqda...</span>
                        </div>
                        <div class="stat-item">
                            <div class="stat-dot blue"></div>
                            <span id="lesson-count">0 kun</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="controls-grid">
                    <div class="control-group">
                        <label>Oy va yil tanlash</label>
                        <div class="input-group">
                            <select id="month-select">
                                <option value="0">Yanvar</option>
                                <option value="1">Fevral</option>
                                <option value="2">Mart</option>
                                <option value="3">Aprel</option>
                                <option value="4">May</option>
                                <option value="5">Iyun</option>
                                <option value="6">Iyul</option>
                                <option value="7">Avgust</option>
                                <option value="8">Sentabr</option>
                                <option value="9">Oktabr</option>
                                <option value="10">Noyabr</option>
                                <option value="11">Dekabr</option>
                            </select>
                            <select id="year-select"></select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" style="text-align: center; padding: 40px; color: #666;">
                <p>Talabalar yuklanmoqda...</p>
            </div>

            <!-- Grade Table -->
            <div class="table-container" id="table-container" style="display: none;">
                <div id="table-content"></div>
            </div>
        </div>
    </div>

<script>
    const groupId = '{{ group.id }}';
    const lessonDays = "{{ group.lesson_days }}";
    let students = [];
    let grades = {};
    let lessonDates = [];
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let currentSelector = null;

    function getTodayDateString() {
        return new Date().toISOString().split('T')[0];
    }

    function getTomorrowDateString() {
        const t = new Date();
        t.setDate(t.getDate() + 1);
        return t.toISOString().split('T')[0];
    }

    function canEditDate(dateString) {
        const today = getTodayDateString();
        const tomorrow = getTomorrowDateString();
        return dateString === today || dateString === tomorrow;
    }

    function isPastDate(dateString) {
        return dateString < getTodayDateString();
    }

    document.addEventListener('DOMContentLoaded', () => {
        initializeYearSelect();
        setCurrentDate();
        loadStudentsFromAPI();

        document.addEventListener('click', e => {
            if (!e.target.closest('.grade-cell') && currentSelector) {
                currentSelector.remove();
                currentSelector = null;
            }
        });
    });

    async function loadStudentsFromAPI() {
        try {
            const res = await fetch(`/manager/api/groups/${groupId}/students/`);
            if (!res.ok) throw new Error(`API xatolik: ${res.status}`);
            const data = await res.json();
            students = data.map(s => ({id: s.id, name: s.full_name, joinDate: getTodayDateString()}));
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('table-container').style.display = 'block';
            updateLessonDates();
            await loadExistingGrades();
            renderTable();
        } catch (e) {
            console.error(e);
            document.getElementById('loading-state').innerHTML = `<p style="color:red;">❌ Talabalarni yuklashda xatolik: ${e.message}</p>`;
        }
    }

    async function loadExistingGrades() {
        try {
            const startDate = new Date(currentYear, currentMonth, 1).toISOString().split('T')[0];
            const endDate = new Date(currentYear, currentMonth + 1, 0).toISOString().split('T')[0];
            const res = await fetch(`/manager/api/grades/?group=${groupId}&start_date=${startDate}&end_date=${endDate}`);
            if (res.ok) {
                const data = await res.json();
                data.forEach(item => {
                    const date = item.date_time.split('T')[0];
                    grades[`${item.student}-${date}`] = item.grade;
                });
            }
        } catch (e) { console.error(e); }
    }

    function initializeYearSelect() {
        const yearSelect = document.getElementById('year-select');
        for (let y = 2020; y <= 2030; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            yearSelect.appendChild(opt);
        }
    }

    function setCurrentDate() {
        document.getElementById('month-select').value = currentMonth;
        document.getElementById('year-select').value = currentYear;
    }

    document.getElementById('month-select').addEventListener('change', async function() {
        currentMonth = parseInt(this.value);
        updateLessonDates();
        await loadExistingGrades();
        renderTable();
    });

    document.getElementById('year-select').addEventListener('change', async function() {
        currentYear = parseInt(this.value);
        updateLessonDates();
        await loadExistingGrades();
        renderTable();
    });

    function getLessonDaysNumbers() {
        const dayMap = { mo:1, tu:2, we:3, thu:4, fri:5, sa:6 };
        return lessonDays.toLowerCase().split(' ').map(d => dayMap[d]).filter(Boolean);
    }

    function getWeekdays(month, year) {
        const dates = [];
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const allowedDays = getLessonDaysNumbers();

        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(year, month, day);
            if (!allowedDays.includes(date.getDay())) continue;
            const dateStr = date.toISOString().split('T')[0];
            dates.push({
                date: dateStr,
                display: `${String(day).padStart(2,'0')}.${String(month+1).padStart(2,'0')}`,
                canEdit: canEditDate(dateStr),
                isPast: isPastDate(dateStr)
            });
        }
        return dates;
    }

    function updateLessonDates() {
        lessonDates = getWeekdays(currentMonth, currentYear);
        students.forEach(student => {
            lessonDates.forEach(d => {
                const key = `${student.id}-${d.date}`;
                if (!(key in grades) && new Date(d.date) >= new Date(student.joinDate)) {
                    grades[key] = null;
                }
            });
        });
    }

    function getGradeColor(g) {
        switch(g) {
            case 1: case 2: return '#ef4444';
            case 3: return '#facc15';
            case 4: return '#22c55e';
            case 5: return '#16a34a';
            default: return '#ccc';
        }
    }

    function showGradeSelector(event, cell, studentId, date) {
        event.stopPropagation();
        if (!canEditDate(date)) return;
        if (currentSelector) currentSelector.remove();

        const selector = document.createElement('div');
        selector.style.display = 'flex';
        selector.style.gap = '3px';
        selector.className = 'grade-selector';

        for (let i = 1; i <= 5; i++) {
            const opt = document.createElement('div');
            opt.textContent = i;
            opt.style.width = '35px';
            opt.style.height = '35px';
            opt.style.lineHeight = '35px';
            opt.style.textAlign = 'center';
            opt.style.borderRadius = '5px';
            opt.style.backgroundColor = getGradeColor(i);
            opt.style.color = 'white';
            opt.style.fontWeight = 'bold';
            opt.style.cursor = 'pointer';
            opt.onmouseover = () => opt.style.filter = 'brightness(1.2)';
            opt.onmouseout = () => opt.style.filter = 'none';
            opt.onclick = async e => {
                e.stopPropagation();
                await submitGrade(studentId, date, i);
                currentSelector.remove();
                currentSelector = null;
            };
            selector.appendChild(opt);
        }

        cell.appendChild(selector);
        currentSelector = selector;
    }

    async function submitGrade(studentId, date, gradeValue) {
        if (!canEditDate(date)) return;
        try {
            const res = await fetch('/manager/api/grades/save-single/', {
                method: 'POST',
                headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
                body: JSON.stringify({student_id:studentId, group_id:groupId, date:date, grade:gradeValue})
            });
            const data = await res.json();
            if (data.success) {
                grades[`${studentId}-${date}`] = gradeValue;
                renderTable();
            } else alert(data.error || 'Bahoni saqlashda xatolik');
        } catch(e) { alert('Bahoni saqlashda xatolik'); }
    }

    function getGradeStats(studentId) {
        const vals = Object.entries(grades)
            .filter(([k,v]) => k.startsWith(`${studentId}-`) && v != null)
            .map(([_,v]) => v);
        const avg = vals.length > 0 ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : 0;
        return {average: avg};
    }

    function renderTable() {
        const tableContent = document.getElementById('table-content');
        if (students.length === 0) { 
            tableContent.innerHTML = `<p>Bu guruhda talabalar mavjud emas</p>`; 
            return; 
        }

        let html = `<table><thead><tr><th>O'quvchi</th>${lessonDates.map(d=>`<th>${d.display}</th>`).join('')}<th>O'rtacha</th></tr></thead><tbody>`;
        students.forEach((s,idx) => {
            const stats = getGradeStats(s.id);
            html += `<tr style="background:${idx%2===0?'#fff':'#f8f8f8'}"><td>${s.name}</td>`;
            lessonDates.forEach(d => {
                const key = `${s.id}-${d.date}`;
                const val = grades[key];
                html += `<td class="grade-cell" style="text-align:center;cursor:${d.canEdit?'pointer':'default'}"${d.canEdit?` onclick="showGradeSelector(event,this,${s.id},'${d.date}')"`:''}>
                    <div style="width:35px;height:35px;line-height:35px;border-radius:5px;background-color:${val?getGradeColor(val):'#e5e7eb'};color:white;font-weight:bold;text-align:center;font-size:1rem;">
                        ${val?val:''}
                    </div>
                </td>`;
            });
            html += `<td style="text-align:center">${stats.average}</td></tr>`;
        });
        html += `</tbody></table>`;
        tableContent.innerHTML = html;
    }

    function getCookie(name){
        let cookieValue = null;
        if(document.cookie && document.cookie!==''){
            const cookies = document.cookie.split(';');
            for(let i=0;i<cookies.length;i++){
                const cookie=cookies[i].trim();
                if(cookie.substring(0,name.length+1) === (name+'=')){
                    cookieValue = decodeURIComponent(cookie.substring(name.length+1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

</body>
</html>
