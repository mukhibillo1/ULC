{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davomat Tizimi</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    <style>
        /* Subheader container */
        .subheader {
            background-color: white;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #e5e7eb;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .subheader .container-fluid {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 1rem;
        }

        /* Nav tabs */
        .subheader .nav-tabs {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .subheader .nav-tabs .nav-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #6b7280;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.2s;
            background-color: #e5e7eb20;
        }

        .subheader .nav-tabs .nav-link:hover {
            background-color: #e5e7eb;
            color: #3b82f6;
        }

        .subheader .nav-tabs .active {
            background-color: #3b82f6;
            color: white;
            font-weight: 600;
        }

        /* Month/Year Select Styles */
        #month-select, #year-select {
            border: none;
            border-bottom: 2px solid #d1d5db;
            background: transparent;
            color: #374151;
            font-weight: 500;
            padding: 8px 4px;
            transition: all 0.3s;
            width: 150px;
        }

        #month-select:focus, #year-select:focus {
            border-bottom-color: #2563eb;
            outline: none;
        }

        #month-select:hover, #year-select:hover {
            border-bottom-color: #3b82f6;
        }

        /* O'tgan kunlar uchun maxsus stil */
        .attendance-cell.past-date {
            position: relative;
        }

        /* O'tgan kunlarni yopish uchun overlay */
        .attendance-cell.past-date::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(240,240,240,0.6) 100%);
            pointer-events: none;
            z-index: 1;
            border-radius: 8px;
        }

        /* O'tgan kunlar uchun opacity kamayadi */
        .attendance-cell.past-date .attendance-button {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* O'tgan kunlarda hover buttons ko'rinmasin */
        .attendance-cell.past-date .hover-buttons {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .subheader .container-fluid {
                flex-direction: column;
                gap: 12px;
                padding: 12px 16px;
            }
            
            .nav-tabs {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .nav-tabs .nav-link {
                white-space: nowrap;
                padding: 12px 16px;
            }
        }

        @media (max-width: 576px) {
            .subheader .nav-tabs {
                flex-direction: column;
                gap: 0.25rem;
            }

            .subheader .nav-tabs .nav-link {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="max-width">
            <!--begin::Subheader-->
            <div class="subheader py-2 py-lg-4 subheader-solid" id="kt_subheader">
                <div class="container-fluid d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
                    <ul class="nav nav-tabs">
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'all' %}active{% endif %}" href="{% url 'manager:group-settings' group.pk %}">All</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'attendance' %}active{% endif %}" href="{% url 'manager:attendance-list' group.pk %}">Davomat</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_tab == 'baholash' %}active{% endif %}" href="#">Baholash</a>
                        </li>
                    </ul>
                </div>
            </div>
            <!--end::Subheader-->

            <!-- Header -->
            <div class="header">
                <div class="header-content">
                    <div class="header-title">
                        <h1>Davomat Tizimi</h1>
                        <p>{{ group.name }} - O'quvchilar davomatini boshqarish</p>
                    </div>
                    <div class="header-stats">
                        <div class="stat-item">
                            <div class="stat-dot emerald"></div>
                            <span id="student-count">Yuklanmoqda...</span>
                        </div>
                        <div class="stat-item">
                            <div class="stat-dot blue"></div>
                            <span id="lesson-count">0 kun</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="controls-grid">
                    <div class="control-group">
                        <label>Oy va yil tanlash</label>
                        <div class="input-group">
                            <select id="month-select">
                                <option value="0">Yanvar</option>
                                <option value="1">Fevral</option>
                                <option value="2">Mart</option>
                                <option value="3">Aprel</option>
                                <option value="4">May</option>
                                <option value="5">Iyun</option>
                                <option value="6">Iyul</option>
                                <option value="7">Avgust</option>
                                <option value="8">Sentabr</option>
                                <option value="9">Oktabr</option>
                                <option value="10">Noyabr</option>
                                <option value="11">Dekabr</option>
                            </select>
                            <select id="year-select"></select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" style="text-align: center; padding: 40px; color: #666;">
                <p>Talabalar yuklanmoqda...</p>
            </div>

            <!-- Attendance Table -->
            <div class="table-container" id="table-container" style="display: none;">
                <div id="table-content"></div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        const groupId = {{ group.id }};
        const lessonDays = "{{ group.lesson_days }}";
        let students = [];
        let attendance = {};
        let lessonDates = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        // Bugungi sanani olish (faqat sana, vaqtsiz)
        function getTodayDateString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // Sanani solishtirish - o'tgan kun yoki yo'q
        function isPastDate(dateString) {
            const today = getTodayDateString();
            return dateString < today;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Bugungi sana:', getTodayDateString());
            initializeYearSelect();
            setCurrentDate();
            loadStudentsFromAPI();
        });

        // Load students from API
        async function loadStudentsFromAPI() {
            try {
                const response = await fetch(`/manager/api/groups/${groupId}/students/`);
                
                if (!response.ok) {
                    throw new Error(`API xatolik: ${response.status}`);
                }
                
                const apiStudents = await response.json();
                
                students = apiStudents.map(student => ({
                    id: student.id,
                    name: student.full_name,
                    joinDate: new Date().toISOString().split('T')[0]
                }));
                
                console.log('Yuklangan talabalar:', students);
                
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('table-container').style.display = 'block';
                
                updateLessonDates();
                await loadExistingAttendance();
                renderTable();
                updateStats();
                
            } catch (error) {
                console.error('Xatolik:', error);
                document.getElementById('loading-state').innerHTML = `
                    <p style="color: red;">❌ Talabalarni yuklashda xatolik: ${error.message}</p>
                `;
            }
        }

        // Load existing attendance from backend
        async function loadExistingAttendance() {
            try {
                const startDate = new Date(currentYear, currentMonth, 1).toISOString().split('T')[0];
                const endDate = new Date(currentYear, currentMonth + 1, 0).toISOString().split('T')[0];
                
                const response = await fetch(
                    `/manager/api/attendance/?group=${groupId}&start_date=${startDate}&end_date=${endDate}`
                );
                
                if (response.ok) {
                    const attendanceData = await response.json();
                    console.log('Yuklangan davomat:', attendanceData);
                    
                    attendanceData.forEach(item => {
                        const date = item.date_time.split('T')[0];
                        const key = `${item.student}-${date}`;
                        attendance[key] = item.is_present;
                    });
                    
                    console.log('Davomat ma\'lumotlari yuklandi:', Object.keys(attendance).length);
                } else {
                    console.log('Davomat ma\'lumotlari topilmadi yoki API yo\'q');
                }
            } catch (error) {
                console.error('Davomatni yuklashda xatolik:', error);
            }
        }

        function initializeYearSelect() {
            const yearSelect = document.getElementById('year-select');
            for (let year = 2020; year <= 2030; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            }
        }

        function setCurrentDate() {
            document.getElementById('month-select').value = currentMonth;
            document.getElementById('year-select').value = currentYear;
        }

        // Event listeners
        document.getElementById('month-select').addEventListener('change', async function() {
            currentMonth = parseInt(this.value);
            updateLessonDates();
            await loadExistingAttendance();
            renderTable();
            updateStats();
        });

        document.getElementById('year-select').addEventListener('change', async function() {
            currentYear = parseInt(this.value);
            updateLessonDates();
            await loadExistingAttendance();
            renderTable();
            updateStats();
        });

        function getLessonDaysNumbers() {
            const dayMap = {
                'mo': 1,
                'tu': 2,
                'we': 3,
                'thu': 4,
                'fri': 5,
                'sa': 6
            };
            
            const days = lessonDays.toLowerCase().split(' ');
            return days.map(day => dayMap[day]).filter(Boolean);
        }

        function getWeekdays(month, year) {
            const dates = [];
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const allowedDays = getLessonDaysNumbers();
            
            console.log('Allowed lesson days:', allowedDays);
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dayOfWeek = date.getDay();
                
                if (allowedDays.includes(dayOfWeek)) {
                    const dateString = date.toISOString().split('T')[0];
                    dates.push({
                        date: dateString,
                        display: `${day.toString().padStart(2, '0')}.${(month + 1).toString().padStart(2, '0')}`,
                        dayOfMonth: day,
                        dayOfWeek: dayOfWeek,
                        fullDate: date,
                        isPast: isPastDate(dateString)
                    });
                }
            }
            
            console.log(`Found ${dates.length} lesson days for ${month + 1}/${year}`);
            return dates;
        }

        function updateLessonDates() {
            lessonDates = getWeekdays(currentMonth, currentYear);
            
            students.forEach(student => {
                lessonDates.forEach(dateObj => {
                    const key = `${student.id}-${dateObj.date}`;
                    if (!(key in attendance)) {
                        const studentJoinDate = new Date(student.joinDate);
                        const lessonDate = new Date(dateObj.date);
                        
                        if (lessonDate >= studentJoinDate) {
                            attendance[key] = null;
                        }
                    }
                });
            });
        }

        function markAttendance(studentId, date, status) {
            // O'tgan kunlarni tahrirlashni oldini olish
            if (isPastDate(date)) {
                console.log('⛔ O\'tgan kunlarni tahrirlash mumkin emas:', date);
                alert('O\'tgan kunlarni tahrirlash mumkin emas!');
                return;
            }
            
            const key = `${studentId}-${date}`;
            attendance[key] = status;
            renderTable();
            updateStats();
            saveSingleAttendance(studentId, date, status);
        }
        
        async function saveSingleAttendance(studentId, date, status) {
            try {
                const response = await fetch("/manager/api/attendance/save/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({ 
                        attendance: [{
                            student: parseInt(studentId),
                            group: groupId,
                            date_time: date,
                            is_present: status
                        }]
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    console.log(`✅ Saqlandi: Student ${studentId}, ${date}, ${status ? 'Bor' : 'Yo\'q'}`);
                } else {
                    console.error("❌ Xatolik:", result);
                    if (result.error && result.error.includes('O\'tgan kunlarni')) {
                        alert('O\'tgan kunlarni tahrirlash mumkin emas!');
                        // Ma'lumotlarni qayta yuklash
                        await loadExistingAttendance();
                        renderTable();
                    }
                }
            } catch (error) {
                console.error("❌ Serverga ulanishda xatolik:", error);
            }
        }

        function getAttendanceStats(studentId) {
            const student = students.find(s => s.id === studentId);
            if (!student) return { present: 0, absent: 0, total: 0, percentage: 0 };
            
            const studentJoinDate = new Date(student.joinDate);
            
            const studentAttendance = Object.entries(attendance)
                .filter(([key]) => key.startsWith(`${studentId}-`))
                .filter(([key, value]) => {
                    const dateFromKey = key.split('-').slice(1).join('-');
                    const lessonDate = new Date(dateFromKey);
                    return lessonDate >= studentJoinDate;
                })
                .map(([, value]) => value);
            
            const present = studentAttendance.filter(a => a === true).length;
            const absent = studentAttendance.filter(a => a === false).length;
            const total = present + absent;
            
            return { 
                present, 
                absent, 
                total, 
                percentage: total > 0 ? Math.round((present / total) * 100) : 0 
            };
        }

        function renderTable() {
            const tableContent = document.getElementById('table-content');
            
            if (students.length === 0) {
                tableContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"></path>
                            </svg>
                        </div>
                        <h3 class="empty-title">Hozircha o'quvchilar yo'q</h3>
                        <p class="empty-description">Bu guruhda talabalar mavjud emas</p>
                    </div>
                `;
                return;
            }

            let tableHTML = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="min-width: 200px;">O'quvchi</th>
                                ${lessonDates.map(dateObj => `
                                    <th style="text-align: center; min-width: 80px;">
                                        <div style="font-size: 0.875rem; font-weight: 500;">${dateObj.display}</div>
                                    </th>
                                `).join('')}
                                <th style="text-align: center; min-width: 100px;">%</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${students.map((student, index) => {
                                const stats = getAttendanceStats(student.id);
                                return `
                                    <tr style="background-color: ${index % 2 === 0 ? 'white' : '#fafafa'};">
                                        <td>
                                            <div class="student-name">${student.name}</div>
                                            <div class="join-date">${new Date(student.joinDate).toLocaleDateString('uz-UZ')} dan</div>
                                        </td>
                                        ${lessonDates.map(dateObj => {
                                            const key = `${student.id}-${dateObj.date}`;
                                            const status = attendance[key];
                                            const studentJoinDate = new Date(student.joinDate);
                                            const lessonDate = new Date(dateObj.date);
                                            const isBeforeJoinDate = lessonDate < studentJoinDate;
                                            const isPast = dateObj.isPast;
                                            
                                            if (isBeforeJoinDate) {
                                                return `
                                                    <td class="attendance-cell">
                                                        <div class="attendance-button disabled">
                                                            <span style="color: #9ca3af;">-</span>
                                                        </div>
                                                    </td>
                                                `;
                                            }
                                            
                                            return `
                                                <td class="attendance-cell ${isPast ? 'past-date' : ''}" style="position: relative;" data-date="${dateObj.date}" data-ispast="${isPast}">
                                                    <div class="attendance-button ${status === true ? 'present' : status === false ? 'absent' : 'empty'}">
                                                        ${status === true ? `
                                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                                            </svg>
                                                        ` : status === false ? `
                                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                                            </svg>
                                                        ` : ''}
                                                    </div>
                                                    ${!isPast ? `
                                                    <div class="hover-buttons" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); gap: 4px; z-index: 10;">
                                                        <button class="hover-btn present" onclick="markAttendance(${student.id}, '${dateObj.date}', true)" title="Bor" style="padding: 4px;">
                                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                                                            </svg>
                                                        </button>
                                                        <button class="hover-btn absent" onclick="markAttendance(${student.id}, '${dateObj.date}', false)" title="Yo'q" style="padding: 4px;">
                                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                                            </svg>
                                                        </button>
                                                    </div>
                                                    ` : ''}
                                                </td>
                                            `;
                                        }).join('')}
                                        <td style="text-align: center;">
                                            <div class="percentage-badge ${stats.percentage >= 80 ? 'high' : stats.percentage >= 60 ? 'medium' : 'low'}">
                                                ${stats.percentage}%
                                            </div>
                                            <div class="percentage-details">
                                                ${stats.present}/${stats.total}
                                            </div>
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            tableContent.innerHTML = tableHTML;
        }

        function updateStats() {
            document.getElementById('student-count').textContent = `${students.length} o'quvchi`;
            document.getElementById('lesson-count').textContent = `${lessonDates.length} kun`;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Mobile touch interactions
        let touchTimeout;
        
        function handleTouchStart(element) {
            const isPast = element.dataset.ispast === 'true';
            if (!isPast) {
                touchTimeout = setTimeout(() => {
                    const buttons = element.querySelector('.hover-buttons');
                    if (buttons) {
                        buttons.style.display = 'flex';
                    }
                }, 300);
            }
        }
        
        function handleTouchEnd(element) {
            clearTimeout(touchTimeout);
            setTimeout(() => {
                const buttons = element.querySelector('.hover-buttons');
                if (buttons) {
                    buttons.style.display = 'none';
                }
            }, 2000);
        }

        document.addEventListener('touchstart', function(e) {
            const cell = e.target.closest('.attendance-cell');
            if (cell && !cell.classList.contains('past-date')) {
                handleTouchStart(cell);
            }
        });

        document.addEventListener('touchend', function(e) {
            const cell = e.target.closest('.attendance-cell');
            if (cell && !cell.classList.contains('past-date')) {
                handleTouchEnd(cell);
            }
        });

        // Hover orqali tugmalarni ko'rsatish (faqat bugungi va kelajak kunlar uchun)
        document.addEventListener('mouseover', function(e) {
            const cell = e.target.closest('.attendance-cell');
            if (cell && !cell.querySelector('.disabled') && !cell.classList.contains('past-date')) {
                const buttons = cell.querySelector('.hover-buttons');
                if (buttons) {
                    buttons.style.display = 'flex';
                }
            }
        });

        document.addEventListener('mouseout', function(e) {
            const cell = e.target.closest('.attendance-cell');
            if (cell && !cell.classList.contains('past-date')) {
                const buttons = cell.querySelector('.hover-buttons');
                if (buttons && !e.relatedTarget?.closest('.attendance-cell')) {
                    buttons.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
