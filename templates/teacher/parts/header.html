<style>
/* Badge pulse animation */
#notificationBadge {
    animation: pulse-badge 2s infinite;
}

@keyframes pulse-badge {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

/* Notification Card (LC-UP style) */
.notif-card {
    background: white;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid #e5e7eb;
}

.notif-card:hover {
    background: #f9fafb;
    transform: translateX(-2px);
    border-color: #3b82f6;
}

.notif-card.unread {
    background: #fef3c7;
    border-left: 3px solid #f59e0b;
}

.notif-sender {
    font-size: 15px;
    font-weight: 600;
    color: #1f2937;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
}

.notif-time {
    font-size: 13px;
    color: #6b7280;
    font-weight: 500;
}

.notif-about {
    font-size: 12px;
    color: #3b82f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
}

.notif-date {
    font-size: 12px;
    color: #9ca3af;
}

.new-badge-small {
    background: #ef4444;
    color: white;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 6px;
}

/* Custom scrollbar */
#notificationScrollArea::-webkit-scrollbar {
    width: 6px;
}

#notificationScrollArea::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

#notificationScrollArea::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}

#notificationScrollArea::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const badge = document.getElementById('notificationBadge');
    const notifCountText = document.getElementById('notifCountText');
    const notificationCards = document.getElementById('notificationCards');
    const notifLoading = document.getElementById('notifLoading');
    const notifEmptyState = document.getElementById('notifEmptyState');
    const detailModal = new bootstrap.Modal(document.getElementById('notificationDetailModal'));
    const detailContent = document.getElementById('notificationDetailContent');
    
    // Initial load
    loadNotifications();
    
    // Auto refresh every 30 seconds
    setInterval(loadNotifications, 30000);
    
    // Load notifications
    async function loadNotifications() {
        try {
            // Get count
            const countRes = await fetch('{% url "teacher:notification-count" %}');
            const countData = await countRes.json();
            updateBadge(countData.unread_count);
            
            // Get last 4 notifications (all, not just unread)
            const listRes = await fetch('{% url "teacher:notification-list-api" %}?limit=4&status=all');
            const listData = await listRes.json();
            
            notifLoading.classList.add('d-none');
            
            if (listData.notifications && listData.notifications.length > 0) {
                renderCards(listData.notifications);
                notifEmptyState.classList.add('d-none');
            } else {
                notificationCards.innerHTML = '';
                notifEmptyState.classList.remove('d-none');
            }
            
        } catch (error) {
            console.error('Error loading notifications:', error);
            notifLoading.classList.add('d-none');
        }
    }
    
    // Update badge
    function updateBadge(count) {
        if (count > 0) {
            badge.textContent = count > 9 ? '9+' : count;
            badge.style.display = 'flex';
            notifCountText.textContent = `${count} ta yangi`;
        } else {
            badge.style.display = 'none';
            notifCountText.textContent = '0 ta yangi';
        }
    }
    
    // Render cards (LC-UP style)
    function renderCards(notifications) {
        notificationCards.innerHTML = '';
        
        notifications.forEach(notif => {
            const time = new Date(notif.created_at);
            const timeStr = time.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
            const dateStr = time.toLocaleDateString('uz-UZ', { day: '2-digit', month: 'short' }).replace('.', '') + ' / ' + time.getFullYear().toString().slice(-2);
            
            const card = document.createElement('div');
            card.className = `notif-card ${!notif.is_read ? 'unread' : ''}`;
            card.onclick = () => showDetail(notif.id);
            
            card.innerHTML = `
                <div class="notif-sender">
                    <span>
                        ${notif.sender_name}
                        ${!notif.is_read ? '<span class="new-badge-small">NEW</span>' : ''}
                    </span>
                    <span class="notif-time">${timeStr}</span>
                </div>
                <div class="notif-about">
                    <span>About: ${notif.message_type_display || 'Message'}</span>
                    <span class="notif-date">${dateStr}</span>
                </div>
            `;
            
            notificationCards.appendChild(card);
        });
    }
    
    // Show detail
    async function showDetail(id) {
        try {
            detailContent.innerHTML = '<div class="text-center py-10"><div class="spinner-border text-primary"></div></div>';
            detailModal.show();
            
            const res = await fetch(`{% url "teacher:notification-detail-api" 0 %}`.replace('0', id));
            const data = await res.json();
            
            if (data.success) {
                const n = data.notification;
                const time = new Date(n.created_at);
                const timeStr = time.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
                const dateStr = time.toLocaleDateString('uz-UZ', { day: '2-digit', month: 'short' }).replace('.', '') + ' / ' + time.getFullYear().toString().slice(-2);
                
                detailContent.innerHTML = `
                    <div style="padding: 24px;">
                        <!-- Header -->
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                            <div>
                                <h6 style="font-weight: 600; color: #1f2937; margin-bottom: 4px;">${n.sender_name}</h6>
                                <span style="font-size: 12px; color: #3b82f6;">About: ${n.message_type_display || 'Message'}</span>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 13px; color: #6b7280; font-weight: 500;">${timeStr}</div>
                                <div style="font-size: 12px; color: #9ca3af; margin-top: 2px;">${dateStr}</div>
                            </div>
                        </div>
                        
                        <!-- Divider -->
                        <div style="height: 1px; background: #e5e7eb; margin: 16px 0;"></div>
                        
                        <!-- Message -->
                        <div style="background: #f9fafb; padding: 16px; border-radius: 8px; border-left: 3px solid #3b82f6;">
                            <p style="margin: 0; color: #374151; line-height: 1.6; white-space: pre-wrap;">${n.message}</p>
                        </div>
                    </div>
                `;
                
                // Reload notifications
                loadNotifications();
            }
        } catch (error) {
            console.error('Error:', error);
            detailContent.innerHTML = '<div class="text-center py-10 text-danger">Xatolik yuz berdi</div>';
        }
    }
    
    window.showDetail = showDetail;
});
</script>
